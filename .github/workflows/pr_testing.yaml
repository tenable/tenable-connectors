name: Testing Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  connector-list:
    runs-on: ubuntu-latest
    outputs:
      connectors: ${{ steps.list.outputs.connectors }}
    steps:
      - uses: actions/checkout@v4
      - name: Collect Connector list
        id: list
        run: |
           echo "connectors=$(ls connectors | jq -R -s -c 'split("\n")[:-1]')" >> $GITHUB_OUTPUT

  test-build:
    name: connector ${{ matrix.connector }}
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: connector-list
    strategy:
      matrix:
        connector: ${{ fromJSON(needs.connector-list.outputs.connectors) }}

    steps:
      - uses: actions/checkout@v4
      - name: Install TOML Tools
        run: pip install toml-cli

      - name: Create Build Environment
        run: |
          mkdir build
          cp -a connectors/${{ matrix.connector }}/* build/
          cp base/* build/
          cp base/.dockerignore build/

      - name: Build ${{ matrix.connector }}
        run: |
          export BUILDX_NO_DEFAULT_ATTESTATIONS=1
          CON_VERSION=$(toml get --toml-path build/pyproject.toml project.version)
          docker buildx build build \
            --progress plain \
            --no-cache \
            --target release \
            --tag connector \
            --tag tenable-connectors/connector-${{ matrix.connector }}:latest \
            --tag tenable-connectors/connector-${{ matrix.connector }}:${CON_VERSION}

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves,recommendations,compare
          image: connector
          only-severities: critical,high,medium
          ignore-unchanged: true
          ignore-base: true
    steps:
      - name: Checkout Terrascan
        uses: actions/checkout@v3

      - uses: docker/setup-qemu-action@v2

      - name: Login to Artifactory
        run: docker login --username svc_terrascan --password ${{ secrets.ARTIFACTORY_API_TOKEN }}  https://docker-terrascan-local.artifactory.eng.tenable.com

      - name: Build latest docker image
        run: make docker-build-push-latest
        env:
          MULTIPLATFORM: true

      - name: Pull Image
        run:  docker pull docker-terrascan-local.artifactory.eng.tenable.com/tenb-cb:latest

      - name: Run qualys scan
        run: |
          image_tag=$(<dockerhub-image-label.txt)
          docker run -e JKN_USERNAME=${{ secrets.JKN_USERNAME }} -e JKN_PASSWORD=${{ secrets.JKN_PASSWORD }} -t docker-terrascan-local.artifactory.eng.tenable.com/tenb-cb:latest jobs execute-job  --credential-mode env -n teams-deleng-terraform -p deleng-terraform/dockerhub-publish -d "{\"APPID\":\"2054\", \"IMAGE\":\"docker-terrascan-local.artifactory.eng.tenable.com/qualys2tone:${q_image_tag}\", \"TARGETS\": \"tenable/qualys2tone:latest\", \"MULTIARCH\":\"true\"}" --cloudflare-access-secret ${{ secrets.CF_ACCESS_TOKEN }}:${{ secrets.CF_SECRET }}
      - name: Run crowdstrike scan
        run: |
          image_tag=$(<dockerhub-image-label.txt)
          docker run -e JKN_USERNAME=${{ secrets.JKN_USERNAME }} -e JKN_PASSWORD=${{ secrets.JKN_PASSWORD }} -t docker-terrascan-local.artifactory.eng.tenable.com/tenb-cb:latest jobs execute-job  --credential-mode env -n teams-deleng-terraform -p deleng-terraform/dockerhub-publish -d "{\"APPID\":\"2054\", \"IMAGE\":\"docker-terrascan-local.artifactory.eng.tenable.com/crowdstrike2tone:${cs_image_tag}\", \"TARGETS\": \"tenable/crowdstrike2tone:latest\", \"MULTIARCH\":\"true\"}" --cloudflare-access-secret ${{ secrets.CF_ACCESS_TOKEN }}:${{ secrets.CF_SECRET }}
      - name: Run msdefender Scan
        run: |
          image_tag=$(<dockerhub-image-label.txt)
          docker run -e JKN_USERNAME=${{ secrets.JKN_USERNAME }} -e JKN_PASSWORD=${{ secrets.JKN_PASSWORD }} -t docker-terrascan-local.artifactory.eng.tenable.com/tenb-cb:latest jobs execute-job  --credential-mode env -n teams-deleng-terraform -p deleng-terraform/dockerhub-publish -d "{\"APPID\":\"2054\", \"IMAGE\":\"docker-terrascan-local.artifactory.eng.tenable.com/msdefender2tone:${msd_image_tag}\", \"TARGETS\": \"tenable/msdefender2tone:latest\", \"MULTIARCH\":\"true\"}" --cloudflare-access-secret ${{ secrets.CF_ACCESS_TOKEN }}:${{ secrets.CF_SECRET }}
